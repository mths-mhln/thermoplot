[THERMOPLOT SETTINGS]

; Name of the fluid whose thermodynamic diagrams are to be plotted. Name follows the CoolProp naming convention.
fluid_name = R1234ze(E)

; Show fluid spinodal curve in the TS diagram - [True/False] - Default: False
show_spinodal = False

; show fluid isolines in the TS/PH diagram - [True/False] - Default: True
show_isolines = True

; show critical pointin the TS/PH diagram - [True/False] - Default: True
show_critical_point = True

; show critical isobar in the TS diagram - [True/False] - Default: True
show_critical_isobar = True

; Thermodynamic region of interest - TS
s_range = [0, 5000]    
T_range = [200, 400]  

